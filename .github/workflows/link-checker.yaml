name: Check external links

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Check links
      uses: lycheeverse/lychee-action@v2
      with:
        args: >-
          --verbose
          --no-progress
          --max-retries 5
          --retry-wait-time 3
          --host-concurrency 2
          --host-request-interval 1s
          --root-dir "$(pwd)/docs"
          './**/*.md'
        fail: true
        failIfEmpty: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
